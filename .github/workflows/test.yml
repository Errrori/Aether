name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aether
          POSTGRES_PASSWORD: aether
          POSTGRES_DB: aether
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AETHER_DATABASE_DSN: "postgres://aether:aether@localhost:5432/aether?sslmode=disable"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go test -v -count=1 ./...
      - run: go test -v -race -count=1 ./...
